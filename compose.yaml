services:
  didacticpancake:
    image: didacticpancake
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: production
      OTP_BASE_URL: http://otp:8080
    ports:
      - 3001:3000

  otp:
    image: opentripplanner/opentripplanner:2.6.0
    ports:
      - '8080:8080'
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx6g
    volumes:
      - ./otp:/var/opentripplanner
    command: ['--build', '--save', '--serve']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/otp/actuators/health']
      interval: 30s
      timeout: 10s
      retries: 5

  gtfs-updater:
    image: curlimages/curl:latest
    volumes:
      - ./otp:/var/opentripplanner
    
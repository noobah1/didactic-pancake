services:
  otp:
    image: opentripplanner/opentripplanner:2.6.0
    ports:
      - '8080:8080'
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx6g
    volumes:
      - ./otp:/var/opentripplanner
    command: ['--build', '--save', '--serve']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/otp/actuators/health']
      interval: 30s
      timeout: 10s
      retries: 5

  gtfs-updater:
    image: curlimages/curl:latest
    volumes:
      - ./otp:/var/opentripplanner
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while true; do
          echo "$$(date) — Waiting 24h until next GTFS update..."
          sleep 86400
          echo "$$(date) — Downloading fresh GTFS data..."
          curl -L -o /var/opentripplanner/data/estonia_unified_gtfs.zip.tmp https://eu-gtfs.remix.com/estonia_unified_gtfs.zip
          mv /var/opentripplanner/data/estonia_unified_gtfs.zip.tmp /var/opentripplanner/data/estonia_unified_gtfs.zip
          echo "$$(date) — Downloading fresh OSM data..."
          curl -L -o /var/opentripplanner/data/estonia-latest.osm.pbf.tmp https://download.geofabrik.de/europe/estonia-latest.osm.pbf
          mv /var/opentripplanner/data/estonia-latest.osm.pbf.tmp /var/opentripplanner/data/estonia-latest.osm.pbf
          rm -f /var/opentripplanner/graph.obj
          echo "$$(date) — Data updated. Restart OTP to rebuild: docker compose restart otp"
        done
    restart: unless-stopped

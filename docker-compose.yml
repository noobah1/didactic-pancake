services:
  otp:
    image: opentripplanner/opentripplanner:2.6.0
    ports:
      - '8080:8080'
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx4g
    volumes:
      - ./otp:/var/opentripplanner
    command: ['--load', '--serve']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/otp/actuators/health']
      interval: 30s
      timeout: 10s
      retries: 5
